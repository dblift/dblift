name: Run Unit Tests

on:
  push:
    branches:
      - main
      - 'release/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e ".[dev]"

    - name: Run unit tests (coverage gate)
      run: |
        # On push main / release: full suite is the absolute source of truth.
        # --cov-fail-under=77 is the hard floor on combined coverage.
        # xdist uses loadscope so tests in the same module/class stay on the
        # same worker, reducing risk from module-local monkeypatching while
        # still parallelising independent unit modules.
        python -m pytest tests/unit/ \
          -n auto \
          --dist=loadscope \
          -p no:benchmark \
          --timeout=120 \
          --cov \
          --cov-report=xml:coverage.xml \
          --cov-report=term-missing \
          --cov-fail-under=77

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      if: always()
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        flags: unit
        name: unit-tests-${{ matrix.python-version }}
        fail_ci_if_error: false
        verbose: true
      continue-on-error: true

  # Integration tests have been moved to integration-tests-new.yml
  # Code quality checks have been moved to code-quality.yml
  # This workflow now focuses solely on unit tests for faster feedback
