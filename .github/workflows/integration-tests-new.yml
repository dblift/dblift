        attempt=1
        
        while [ $attempt -le $max_attempts ]; do
          if docker compose ps ${{ matrix.database }} | grep -q "healthy"; then
            echo "✅ Healthy!"
            break
          fi
          echo "⏳ Waiting..."
          sleep 10
          attempt=$((attempt + 1))
        done
        
        sleep 30

    - name: Run feature tests (placeholders & callbacks)
      run: |
        export DBLIFT_CORE_TEST_DB="${{ matrix.database }}"
        python -m pytest tests/integration/features/ \
          -v \
          --tb=short \
          --cov \
          --cov-report=xml:coverage.xml \
