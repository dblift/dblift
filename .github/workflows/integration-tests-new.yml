        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e ".[dev,all]"
        python -m pip install docker pytest pytest-cov
        
    - name: Start ${{ matrix.database }} container
      run: |
        cd tests/integration
        docker compose up -d ${{ matrix.database }}
        
    - name: Wait for ${{ matrix.database }} to be ready
      timeout-minutes: 10
      run: |
        cd tests/integration
