[tool.bandit]
# Security scan scope
exclude_dirs = ["tests", "scripts", "venv", ".venv", "build", "dist"]
# Findings policy: CI fails on HIGH severity only. MEDIUM/LOW tracked as
# baseline. B608 (SQL via string construction) is intrinsic to a migration
# tool â€” reviewed case-by-case and silenced with `# nosec B608 <reason>`
# on the specific line when legitimate.
skips = []

[tool.coverage.run]
# Source paths to measure coverage for
source = ["."]
# Required for correct coverage collection when running under pytest-xdist workers
concurrency = ["multiprocessing", "thread"]
# Omit patterns - files/directories to exclude from coverage
omit = [
    "tests/*",
    "docs/*",
    "scripts/*",
    "example/*",
    "*.md",
    "*.yml",
    "*.yaml",
    ".github/*",
    "setup.py",
    "conftest.py",
]
