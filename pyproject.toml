[build-system]
requires = ["setuptools>=78.1.1", "wheel>=0.46.2"]
build-backend = "setuptools.build_meta"

[project]
name = "dblift"
version = "1.6.0"
description = "A database migration tool that supports multiple databases with native Python drivers"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "PyYAML>=6.0.1",
    "tabulate>=0.9.0",
    "python-dateutil>=2.8.2",
    "typing-extensions>=4.7.1",
    "click>=8.1.7",
    "rich>=13.3.0",
    "Jinja2>=3.1.0",
    "sqlglot>=30.0.0",
    "sqlfluff>=4.0.0",
    "SQLAlchemy>=2.0.0",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Build Tools",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

[project.scripts]
dblift = "cli.main:main"

# Epic 26 story 26-12: dialect plugin discovery via entry-points.
# First-party plugins ship inside the wheel under db/plugins/<X>/;
# third parties install their own package and register through this
# same group. ``ProviderRegistry.discover_plugins`` reads them via
# ``importlib.metadata.entry_points``.
[project.entry-points."dblift.providers"]
postgresql = "db.plugins.postgresql.plugin:PLUGIN"
mysql = "db.plugins.mysql.plugin:PLUGIN"
mariadb = "db.plugins.mariadb.plugin:PLUGIN"
sqlite = "db.plugins.sqlite.plugin:PLUGIN"
oracle = "db.plugins.oracle.plugin:PLUGIN"
sqlserver = "db.plugins.sqlserver.plugin:PLUGIN"
db2 = "db.plugins.db2.plugin:PLUGIN"
cosmosdb = "db.plugins.cosmosdb.plugin:PLUGIN"

[project.entry-points."dblift.commands"]
builtin = "cli.extensions:register_builtin_command_extensions"

[project.entry-points."dblift.command_handlers"]
builtin = "cli.extensions:load_builtin_command_handlers"

[project.entry-points."dblift.terminal_commands"]

[project.entry-points."dblift.features"]

[project.optional-dependencies]
dev = [
    "pytest>=7.3.1",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.10.0",
    "pytest-asyncio>=0.21.0",
    "pytest-xdist>=3.3.1",
    "pytest-timeout>=2.2.0",
    "pytest-html>=4.0.0",
    "pytest-metadata>=3.0.0",
    "pytest-benchmark>=4.0.0",
    "coverage>=7.3.0",
    "black>=23.3.0",
    "mypy>=1.3.0",
    "flake8>=6.1.0",
    "isort>=5.12.0",
    "docker>=6.1.2",
    "types-PyYAML>=6.0.12.12",
    "types-setuptools",
    "pre-commit>=4.0.0",
    # Security and quality tooling (see .github/workflows/security.yml,
    # complexity.yml). Versions floored at known-good releases.
    "bandit>=1.7.9",
    "pip-audit>=2.7.3",
    "radon>=6.0.1",
    "xenon>=0.9.1",
]
postgresql = ["psycopg[binary]>=3.1"]
mysql = ["PyMySQL>=1.1"]
mariadb = ["PyMySQL>=1.1"]
oracle = ["oracledb>=2.0"]
sqlserver = ["pymssql>=2.2"]
db2 = ["ibm_db>=3.2", "ibm_db_sa>=0.4"]
cosmosdb = ["azure-cosmos>=4.5"]
all = ["dblift[postgresql,mysql,mariadb,oracle,sqlserver,db2,cosmosdb]"]

[tool.setuptools]
# Use find directive to automatically discover all packages
# Exclude non-package directories that setuptools might mistake for packages
[tool.setuptools.packages.find]
include = ["api*", "cli*", "config*", "core*", "db*"]
exclude = ["tests*", "demo*", "scripts*", "docs*", "example*", "logo*", "site*"]

[tool.setuptools.package-data]
# PEP 561: ship ``api/py.typed`` so downstream type checkers pick up
# the public API's type annotations. See docs/semver-policy.md.
api = ["py.typed"]
core = ["reports/templates/*.html"]

[tool.black]
line-length = 100
target-version = ['py311', 'py312']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | venv
)/
'''

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["api", "cli", "config", "core", "db"]

[tool.mypy]
# Lowest supported Python version; mypy type-checks against this version.
# See docs/adr/0004-bump-minimum-python-to-3-11.md.
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true

# For now, don't enforce complete typing everywhere to allow gradual adoption
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true

# Allow Any types to facilitate adoption
disallow_any_expr = false
disallow_any_generics = false
disallow_subclassing_any = false

# Enable implicit Optional for compatibility with existing code
no_implicit_optional = false

# Always ignore missing imports
ignore_missing_imports = true

# Don't warn about unused type: ignore comments during gradual typing adoption
warn_unused_ignores = false

# Required to find modules correctly
namespace_packages = true
explicit_package_bases = true

# Show error codes for easier filtering
show_error_codes = true
pretty = true

# Skip these directories/files
exclude = [
    "venv",
    ".venv",
    "build",
    "dist",
    "tests",
]

# More detailed reports
warn_redundant_casts = true
warn_no_return = true
warn_unreachable = true

disable_error_code = ["unreachable"]

# ---------------------------------------------------------------------------
# Per-module STRICT zone (PR-E4).
#
# Modules listed below are type-checked under mypy ``--strict`` (every flag
# the CLI ``--strict`` switch turns on). The intent is to grow this list one
# module at a time so new code lands in the strict zone by default and old
# code is migrated incrementally.
#
# To add a module:
#   1. Run ``mypy --strict <module>`` and confirm 0 errors *in that file*
#      (cascaded errors from imports stay in the lax baseline â€” that's fine).
#   2. Add it to the ``module = [...]`` list below.
#   3. Run ``mypy --config-file pyproject.toml api/ cli/ config/ core/ db/``
#      end-to-end and confirm 0 errors.
#
# Strict flags mirror what the CLI ``--strict`` switch enables; keeping them
# explicit here makes the contract diff-able when mypy adds new strict
# defaults in future releases.
# ---------------------------------------------------------------------------
[[tool.mypy.overrides]]
module = [
    "api.__init__",
    "api._client_factory",
    "api.events",
]
disallow_any_generics = true
disallow_subclassing_any = true
disallow_untyped_calls = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_unused_ignores = true
no_implicit_reexport = true
strict_equality = true

# PR-F1: extend the strict zone to the rest of ``api/``. Same flag set as
# above except ``no_implicit_reexport`` â€” enforcing it on these two
# modules would require touching ``core.migration.commands.export_schema_command``
# and ``core.logger.results`` to add explicit ``__all__`` re-exports, which
# is scope creep beyond the ``api/`` package. When Phase F+ extends the
# strict zone into ``core/``, those re-exports become a one-shot fix and
# this carve-out can be removed.
[[tool.mypy.overrides]]
module = [
    "api._client_operations",
    "api.client",
]
disallow_any_generics = true
disallow_subclassing_any = true
disallow_untyped_calls = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_unused_ignores = true
strict_equality = true

